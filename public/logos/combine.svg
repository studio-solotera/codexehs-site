<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 96" role="img" aria-label="Codex EHS">
  <title>Codex EHS</title>
  <style>
    .cmb-text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-weight: 900; }
    .cmb-mono { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-weight: 900; text-anchor: middle; }
  </style>
  <!-- Monogramme 96x96 -->
  <rect x="0" y="0" width="96" height="96" rx="8" fill="#0F2A47"/>
  <text x="48" y="42" class="cmb-mono" font-size="14" fill="#FFFFFF" letter-spacing="0.3">CODEX</text>
  <rect x="27" y="48" width="42" height="3" fill="#F26B1F"/>
  <rect x="27" y="48" width="42" height="3" fill="#F26B1F"/>
  <text x="48" y="74" class="cmb-mono" font-size="22" fill="#FFFFFF" letter-spacing="1.2">EHS</text>
  <!-- Wordmark a droite -->
  <text x="120" y="60" class="cmb-text" font-size="48" fill="#0F2A47" letter-spacing="-1.5">CODEX</text>
  <rect x="288" y="20" width="4" height="44" fill="#F26B1F"/>
  <text x="300" y="60" class="cmb-text" font-size="48" fill="#0F2A47" letter-spacing="-1">EHS</text>
</svg>
