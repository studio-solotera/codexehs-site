            <line y1="28" x2="612" y2="28" stroke="#E5E7EB" stroke-width="0.5"/>
            <text x="12" y="18">PA-004</text>
            <text x="74" y="18">Maintenance préventive</text>
            <text x="288" y="18">S. Bernard</text>
            <text x="392" y="18">04-06-26</text>
