        <text x="14" y="64" font-size="10" fill="#4A5057">Pilote : Julie Durand</text>
        <text x="14" y="80" font-size="10" fill="#4A5057">Échéance : 25-04-26 (24j de retard)</text>
        <text x="14" y="96" font-size="10" fill="#4A5057">Criticité : 16 (Gravité 4 × Proba 4)</text>
