    <text x="20" y="26" fill="#FFFFFF" font-size="12" font-weight="700" letter-spacing="0.04em">PRÉ-RUNDE DG / CSSCT EN 30 SECONDES</text>
    <text x="20" y="48" fill="#FFFFFF" font-size="11" opacity="0.9">Tu ouvres l’iPhone, tu vois les retards.</text>
    <text x="20" y="66" fill="#FFFFFF" font-size="11" opacity="0.9">Tu sais quoi pousser sans rouvrir le PC.</text>
