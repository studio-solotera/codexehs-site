<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="800" fill="#F5F6F8"/>

  <rect x="40" y="40" width="1200" height="720" rx="10" fill="#FFFFFF" stroke="#D0D5DA" stroke-width="1"/>
  <rect x="40" y="40" width="1200" height="36" rx="10" fill="#0F2A47"/>
  <rect x="40" y="64" width="1200" height="12" fill="#0F2A47"/>
  <circle cx="62" cy="58" r="6" fill="#FF5F57"/>
  <circle cx="82" cy="58" r="6" fill="#FEBC2E"/>
  <circle cx="102" cy="58" r="6" fill="#28C840"/>
  <text x="640" y="63" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="500" letter-spacing="0.04em">CODEX EHS — MATRICE CRITICITÉ 5×5</text>

  <g transform="translate(40,76)">
    <rect width="1200" height="34" fill="#1A1F24"/>
    <g font-size="11" font-weight="600" fill="#FFFFFF">
      <text x="71" y="22" text-anchor="middle" opacity="0.7">📝 Démarrer ici</text>
      <text x="203" y="22" text-anchor="middle" opacity="0.7">📋 Plan d’action</text>
      <rect x="240" y="4" width="120" height="26" rx="3" fill="#F26B1F"/>
      <text x="300" y="22" text-anchor="middle">📊 Dashboard</text>
      <text x="397" y="22" text-anchor="middle" opacity="0.7">📅 Planning</text>
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(60,140)">
    <text x="0" y="22" font-size="22" font-weight="800" fill="#0F2A47" letter-spacing="-0.02em">Matrice Gravité × Probabilité</text>
    <text x="0" y="44" font-size="11" fill="#4A5057">187 actions ouvertes — color scale automatique sur la criticité (G × P)</text>
  </g>

  <!-- Heatmap -->
  <g transform="translate(280,200)">
    <!-- Y axis label -->
    <text x="-200" y="200" font-size="11" font-weight="700" fill="#0F2A47" letter-spacing="0.08em" transform="rotate(-90,-200,200)">GRAVITÉ →</text>
    <!-- Y labels -->
    <g font-size="11" font-weight="600" fill="#4A5057" text-anchor="end">
      <text x="-12" y="44">5 — Catastrophique</text>
      <text x="-12" y="124">4 — Majeur</text>
      <text x="-12" y="204">3 — Modéré</text>
      <text x="-12" y="284">2 — Mineur</text>
      <text x="-12" y="364">1 — Négligeable</text>
    </g>
    <!-- X labels (bottom) -->
    <g font-size="11" font-weight="600" fill="#4A5057" text-anchor="middle">
      <text x="40" y="420">1</text>
      <text x="120" y="420">2</text>
      <text x="200" y="420">3</text>
      <text x="280" y="420">4</text>
      <text x="360" y="420">5</text>
      <text x="40" y="438" font-size="9.5">Rare</text>
      <text x="120" y="438" font-size="9.5">Possible</text>
      <text x="200" y="438" font-size="9.5">Probable</text>
      <text x="280" y="438" font-size="9.5">Fréquent</text>
      <text x="360" y="438" font-size="9.5">Certain</text>
    </g>
    <text x="200" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#0F2A47" letter-spacing="0.08em">PROBABILITÉ →</text>

    <!-- Cells -->
    <g font-size="14" font-weight="800" text-anchor="middle">
      <!-- Row Gravité 5 (y=24) -->
      <g transform="translate(0,8)">
        <rect width="80" height="64" fill="#FCEFCB"/><text x="40" y="40" fill="#8C6310">5</text>
        <rect x="80" width="80" height="64" fill="#FCE5D6"/><text x="120" y="40" fill="#D85812">10</text>
        <rect x="160" width="80" height="64" fill="#FCE5D6"/><text x="200" y="40" fill="#D85812">15</text>
        <rect x="240" width="80" height="64" fill="#C8312E"/><text x="280" y="40" fill="#FFFFFF">20</text>
        <rect x="320" width="80" height="64" fill="#C8312E"/><text x="360" y="40" fill="#FFFFFF">25</text>
      </g>
      <!-- Row Gravité 4 -->
      <g transform="translate(0,88)">
        <rect width="80" height="64" fill="#FCEFCB"/><text x="40" y="40" fill="#8C6310">4</text>
        <rect x="80" width="80" height="64" fill="#FCEFCB"/><text x="120" y="40" fill="#8C6310">8</text>
        <rect x="160" width="80" height="64" fill="#FCE5D6"/><text x="200" y="40" fill="#D85812">12</text>
        <rect x="240" width="80" height="64" fill="#FCE5D6"/><text x="280" y="40" fill="#D85812">16</text>
        <rect x="320" width="80" height="64" fill="#C8312E"/><text x="360" y="40" fill="#FFFFFF">20</text>
      </g>
      <!-- Row Gravité 3 -->
      <g transform="translate(0,168)">
        <rect width="80" height="64" fill="#DCEDE3"/><text x="40" y="40" fill="#1F6E45">3</text>
        <rect x="80" width="80" height="64" fill="#FCEFCB"/><text x="120" y="40" fill="#8C6310">6</text>
        <rect x="160" width="80" height="64" fill="#FCEFCB"/><text x="200" y="40" fill="#8C6310">9</text>
        <rect x="240" width="80" height="64" fill="#FCE5D6"/><text x="280" y="40" fill="#D85812">12</text>
        <rect x="320" width="80" height="64" fill="#FCE5D6"/><text x="360" y="40" fill="#D85812">15</text>
      </g>
      <!-- Row Gravité 2 -->
      <g transform="translate(0,248)">
        <rect width="80" height="64" fill="#DCEDE3"/><text x="40" y="40" fill="#1F6E45">2</text>
        <rect x="80" width="80" height="64" fill="#DCEDE3"/><text x="120" y="40" fill="#1F6E45">4</text>
        <rect x="160" width="80" height="64" fill="#FCEFCB"/><text x="200" y="40" fill="#8C6310">6</text>
        <rect x="240" width="80" height="64" fill="#FCEFCB"/><text x="280" y="40" fill="#8C6310">8</text>
        <rect x="320" width="80" height="64" fill="#FCEFCB"/><text x="360" y="40" fill="#8C6310">10</text>
      </g>
      <!-- Row Gravité 1 -->
      <g transform="translate(0,328)">
        <rect width="80" height="64" fill="#DCEDE3"/><text x="40" y="40" fill="#1F6E45">1</text>
        <rect x="80" width="80" height="64" fill="#DCEDE3"/><text x="120" y="40" fill="#1F6E45">2</text>
        <rect x="160" width="80" height="64" fill="#DCEDE3"/><text x="200" y="40" fill="#1F6E45">3</text>
        <rect x="240" width="80" height="64" fill="#DCEDE3"/><text x="280" y="40" fill="#1F6E45">4</text>
        <rect x="320" width="80" height="64" fill="#FCEFCB"/><text x="360" y="40" fill="#8C6310">5</text>
      </g>
    </g>

    <!-- Action counts overlay (bubble in corner) -->
    <g font-size="10" fill="#0F2A47">
      <!-- 5x4: 16 actions -->
      <circle cx="276" cy="20" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="276" y="24" text-anchor="middle" font-weight="700">8</text>
      <!-- 4x4: 16 actions -->
      <circle cx="276" cy="100" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="276" y="104" text-anchor="middle" font-weight="700">5</text>
      <!-- 3x4: 12 -->
      <circle cx="276" cy="180" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="276" y="184" text-anchor="middle" font-weight="700">12</text>
      <!-- 3x3: 9 -->
      <circle cx="196" cy="180" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="196" y="184" text-anchor="middle" font-weight="700">22</text>
      <!-- 2x4: 8 -->
      <circle cx="276" cy="260" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="276" y="264" text-anchor="middle" font-weight="700">18</text>
      <!-- 2x3: 6 -->
      <circle cx="196" cy="260" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="196" y="264" text-anchor="middle" font-weight="700">31</text>
      <!-- 1x3 -->
      <circle cx="196" cy="340" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="196" y="344" text-anchor="middle" font-weight="700">24</text>
      <!-- 5x5 -->
      <circle cx="356" cy="20" r="10" fill="#FFFFFF" stroke="#0F2A47" stroke-width="1.2"/>
      <text x="356" y="24" text-anchor="middle" font-weight="700">2</text>
    </g>
  </g>

  <!-- Right side panel -->
  <g transform="translate(760,200)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#0F2A47" letter-spacing="0.08em">CLASSIFICATION AUTO</text>

    <g transform="translate(0,40)">
      <rect width="380" height="60" rx="6" fill="#DCEDE3"/>
      <rect width="4" height="60" fill="#2A8F5A"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#1F6E45" letter-spacing="0.06em">FAIBLE</text>
      <text x="20" y="44" font-size="13" fill="#1F6E45" font-weight="600">Criticité ≤ 4</text>
      <text x="370" y="44" text-anchor="end" font-size="20" fill="#1F6E45" font-weight="800">79 actions</text>
    </g>
    <g transform="translate(0,112)">
      <rect width="380" height="60" rx="6" fill="#FCEFCB"/>
      <rect width="4" height="60" fill="#E8A317"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#8C6310" letter-spacing="0.06em">MODÉRÉE</text>
      <text x="20" y="44" font-size="13" fill="#8C6310" font-weight="600">Criticité 5 à 9</text>
      <text x="370" y="44" text-anchor="end" font-size="20" fill="#8C6310" font-weight="800">68 actions</text>
    </g>
    <g transform="translate(0,184)">
      <rect width="380" height="60" rx="6" fill="#FCE5D6"/>
      <rect width="4" height="60" fill="#F26B1F"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#D85812" letter-spacing="0.06em">ÉLEVÉE</text>
      <text x="20" y="44" font-size="13" fill="#D85812" font-weight="600">Criticité 10 à 15</text>
      <text x="370" y="44" text-anchor="end" font-size="20" fill="#D85812" font-weight="800">30 actions</text>
    </g>
    <g transform="translate(0,256)">
      <rect width="380" height="60" rx="6" fill="#C8312E"/>
      <text x="20" y="22" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">CRITIQUE</text>
      <text x="20" y="44" font-size="13" fill="#FFFFFF" font-weight="600">Criticité > 15</text>
      <text x="370" y="44" text-anchor="end" font-size="20" fill="#FFFFFF" font-weight="800">10 actions</text>
    </g>

    <g transform="translate(0,348)">
      <rect width="380" height="50" rx="6" fill="#0F2A47"/>
      <text x="20" y="22" font-size="10.5" font-weight="700" fill="#FFFFFF" letter-spacing="0.06em">SEUILS ÉDITABLES</text>
      <text x="20" y="40" font-size="11" fill="#FFFFFF" opacity="0.85">Onglet Référentiels → bloc Seuils criticité</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(60,690)">
    <rect width="1160" height="46" rx="6" fill="#F26B1F"/>
    <text x="580" y="29" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700" letter-spacing="0.04em">DIAGNOSTIC IMMÉDIAT — TU SAIS OÙ APPUYER AVANT LA RÉUNION CSSCT</text>
  </g>
</svg>
