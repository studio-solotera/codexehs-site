<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="800" fill="#F5F6F8"/>

  <!-- Window chrome -->
  <rect x="40" y="40" width="1200" height="720" rx="10" fill="#FFFFFF" stroke="#D0D5DA" stroke-width="1"/>
  <rect x="40" y="40" width="1200" height="36" rx="10" fill="#0F2A47"/>
  <rect x="40" y="64" width="1200" height="12" fill="#0F2A47"/>
  <circle cx="62" cy="58" r="6" fill="#FF5F57"/>
  <circle cx="82" cy="58" r="6" fill="#FEBC2E"/>
  <circle cx="102" cy="58" r="6" fill="#28C840"/>
  <text x="640" y="63" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="500" letter-spacing="0.04em">CODEX EHS — DASHBOARD</text>

  <!-- Tabs -->
  <g transform="translate(40,76)">
    <rect width="1200" height="34" fill="#1A1F24"/>
    <g font-size="11" font-weight="600" fill="#FFFFFF">
      <text x="71" y="22" text-anchor="middle" opacity="0.7">📝 Démarrer ici</text>
      <text x="203" y="22" text-anchor="middle" opacity="0.7">📋 Plan d’action</text>
      <rect x="240" y="4" width="120" height="26" rx="3" fill="#F26B1F"/>
      <text x="300" y="22" text-anchor="middle">📊 Dashboard</text>
      <text x="397" y="22" text-anchor="middle" opacity="0.7">📅 Planning</text>
      <text x="473" y="22" text-anchor="middle" opacity="0.7">📒 Référentiels</text>
    </g>
  </g>

  <!-- Dashboard header -->
  <g transform="translate(60,128)">
    <text x="0" y="22" font-size="22" font-weight="800" fill="#0F2A47" letter-spacing="-0.02em">Plan d’Action EHS — Dashboard</text>
    <text x="0" y="44" font-size="11" fill="#4A5057">Entité : Industrie SAS · Site : Usine principale · Année : 2026 · Pays : France</text>
  </g>

  <!-- CODEX EHS wordmark right -->
  <g transform="translate(1010,118)">
    <text x="0" y="22" font-size="20" font-weight="900" fill="#0F2A47" letter-spacing="-0.04em">CODEX</text>
    <rect x="92" y="2" width="4" height="22" fill="#F26B1F"/>
    <text x="106" y="22" font-size="20" font-weight="900" fill="#0F2A47" letter-spacing="-0.04em">EHS</text>
  </g>

  <!-- KPI grid : 6 cards -->
  <!-- Card 1 -->
  <g transform="translate(60,192)">
    <rect width="184" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">ACTIONS OUVERTES</text>
    <text x="16" y="66" font-size="36" font-weight="800" fill="#0F2A47" letter-spacing="-0.02em">187</text>
    <!-- sparkline -->
    <polyline points="16,90 32,84 48,86 64,80 80,82 96,76 112,78 128,72 144,74 160,68" stroke="#1E4574" stroke-width="1.5" fill="none"/>
    <circle cx="160" cy="68" r="2.5" fill="#F26B1F"/>
  </g>

  <!-- Card 2 -->
  <g transform="translate(252,192)">
    <rect width="184" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">% RÉALISÉES</text>
    <text x="16" y="66" font-size="36" font-weight="800" fill="#2A8F5A" letter-spacing="-0.02em">68%</text>
    <polyline points="16,86 32,84 48,82 64,80 80,76 96,74 112,72 128,70 144,68 160,66" stroke="#1E4574" stroke-width="1.5" fill="none"/>
    <circle cx="160" cy="66" r="2.5" fill="#F26B1F"/>
  </g>

  <!-- Card 3 — EN RETARD -->
  <g transform="translate(444,192)">
    <rect width="184" height="100" rx="8" fill="#FFFFFF" stroke="#C8312E" stroke-width="1.5"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">ACTIONS EN RETARD</text>
    <text x="16" y="66" font-size="36" font-weight="800" fill="#C8312E" letter-spacing="-0.02em">12</text>
    <polyline points="16,90 32,88 48,84 64,86 80,82 96,80 112,78 128,76 144,74 160,72" stroke="#C8312E" stroke-width="1.5" fill="none"/>
    <circle cx="160" cy="72" r="2.5" fill="#F26B1F"/>
  </g>

  <!-- Card 4 -->
  <g transform="translate(636,192)">
    <rect width="184" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">CRITICITÉ MOYENNE</text>
    <text x="16" y="66" font-size="36" font-weight="800" fill="#0F2A47" letter-spacing="-0.02em">9,6</text>
    <text x="100" y="66" font-size="14" fill="#9AA0A8" font-weight="500">/ 25</text>
  </g>

  <!-- Card 5 -->
  <g transform="translate(828,192)">
    <rect width="184" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">DÉLAI MOYEN CLÔTURE</text>
    <text x="16" y="66" font-size="36" font-weight="800" fill="#0F2A47" letter-spacing="-0.02em">42</text>
    <text x="70" y="66" font-size="14" fill="#9AA0A8" font-weight="500">jours</text>
  </g>

  <!-- Card 6 -->
  <g transform="translate(1020,192)">
    <rect width="200" height="100" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" font-weight="700" fill="#4A5057" letter-spacing="0.08em">TOP SECTEUR EN RETARD</text>
    <text x="16" y="60" font-size="20" font-weight="800" fill="#0F2A47">Production</text>
    <text x="16" y="84" font-size="11" fill="#4A5057">5 actions sur 12</text>
  </g>

  <!-- ANNOTATION KPI -->
  <g transform="translate(360,308)">
    <rect width="280" height="34" rx="17" fill="#F26B1F"/>
    <text x="140" y="22" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="0.04em">6 KPI MIS À JOUR EN TEMPS RÉEL</text>
  </g>
  <path d="M 500 308 Q 500 296 500 290" stroke="#F26B1F" stroke-width="2"/>
  <polygon points="500,286 495,295 505,295" fill="#F26B1F"/>

  <!-- Chart area : donut + line chart -->
  <g transform="translate(60,360)">
    <rect width="580" height="280" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#0F2A47">Répartition par statut effectif</text>
    <text x="20" y="50" font-size="10.5" fill="#9AA0A8">Actions totales : 268</text>

    <!-- Donut -->
    <g transform="translate(170,170)">
      <!-- gray bg ring -->
      <circle r="78" fill="none" stroke="#F5F6F8" stroke-width="32"/>
      <!-- green slice (Réalisée 68%) -->
      <circle r="78" fill="none" stroke="#2A8F5A" stroke-width="32"
              stroke-dasharray="333 490" transform="rotate(-90)"/>
      <!-- yellow slice (En cours 22%) -->
      <circle r="78" fill="none" stroke="#E8A317" stroke-width="32"
              stroke-dasharray="108 490" stroke-dashoffset="-333" transform="rotate(-90)"/>
      <!-- red slice (En retard 7%) -->
      <circle r="78" fill="none" stroke="#C8312E" stroke-width="32"
              stroke-dasharray="34 490" stroke-dashoffset="-441" transform="rotate(-90)"/>
      <!-- gray slice (À planifier 3%) -->
      <circle r="78" fill="none" stroke="#9AA0A8" stroke-width="32"
              stroke-dasharray="15 490" stroke-dashoffset="-475" transform="rotate(-90)"/>
      <text y="-2" font-size="32" font-weight="800" fill="#0F2A47" text-anchor="middle" letter-spacing="-0.02em">268</text>
      <text y="20" font-size="10" fill="#4A5057" text-anchor="middle" letter-spacing="0.06em">ACTIONS</text>
    </g>
    <!-- Legend -->
    <g transform="translate(340,100)" font-size="11" fill="#1A1F24">
      <g>
        <rect y="0" width="12" height="12" fill="#2A8F5A"/>
        <text x="22" y="10" font-weight="600">Réalisée</text>
        <text x="200" y="10" text-anchor="end" font-weight="700">182 · 68%</text>
      </g>
      <g transform="translate(0,26)">
        <rect width="12" height="12" fill="#E8A317"/>
        <text x="22" y="10" font-weight="600">En cours</text>
        <text x="200" y="10" text-anchor="end" font-weight="700">59 · 22%</text>
      </g>
      <g transform="translate(0,52)">
        <rect width="12" height="12" fill="#C8312E"/>
        <text x="22" y="10" font-weight="600">En retard</text>
        <text x="200" y="10" text-anchor="end" font-weight="700">19 · 7%</text>
      </g>
      <g transform="translate(0,78)">
        <rect width="12" height="12" fill="#9AA0A8"/>
        <text x="22" y="10" font-weight="600">À planifier</text>
        <text x="200" y="10" text-anchor="end" font-weight="700">8 · 3%</text>
      </g>
    </g>
  </g>

  <!-- Line chart : creation vs clôture -->
  <g transform="translate(660,360)">
    <rect width="560" height="280" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#0F2A47">Création vs clôture — 12 mois glissants</text>
    <!-- Legend -->
    <g transform="translate(360,28)" font-size="10.5" fill="#1A1F24">
      <rect y="-4" width="10" height="10" fill="#1E4574"/>
      <text x="16" y="4">Créations</text>
      <rect x="84" y="-4" width="10" height="10" fill="#2A8F5A"/>
      <text x="100" y="4">Clôtures</text>
    </g>

    <!-- Chart axes -->
    <g transform="translate(40,80)">
      <!-- Y gridlines -->
      <line x1="0" y1="0" x2="500" y2="0" stroke="#E5E7EB" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="500" y2="40" stroke="#E5E7EB" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="500" y2="80" stroke="#E5E7EB" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="500" y2="120" stroke="#E5E7EB" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="500" y2="160" stroke="#9AA0A8" stroke-width="0.8"/>
      <text x="-8" y="4" font-size="9" fill="#9AA0A8" text-anchor="end">25</text>
      <text x="-8" y="44" font-size="9" fill="#9AA0A8" text-anchor="end">18</text>
      <text x="-8" y="84" font-size="9" fill="#9AA0A8" text-anchor="end">12</text>
      <text x="-8" y="124" font-size="9" fill="#9AA0A8" text-anchor="end">6</text>
      <text x="-8" y="164" font-size="9" fill="#9AA0A8" text-anchor="end">0</text>

      <!-- Création line -->
      <polyline points="20,90 60,76 100,98 140,60 180,72 220,52 260,80 300,46 340,68 380,40 420,58 460,30"
                stroke="#1E4574" stroke-width="2.2" fill="none"/>
      <!-- Clôture line -->
      <polyline points="20,120 60,108 100,124 140,90 180,98 220,80 260,104 300,72 340,86 380,64 420,76 460,48"
                stroke="#2A8F5A" stroke-width="2.2" fill="none"/>
      <!-- Points -->
      <g fill="#1E4574">
        <circle cx="20" cy="90" r="2.5"/><circle cx="60" cy="76" r="2.5"/>
        <circle cx="100" cy="98" r="2.5"/><circle cx="140" cy="60" r="2.5"/>
        <circle cx="180" cy="72" r="2.5"/><circle cx="220" cy="52" r="2.5"/>
        <circle cx="260" cy="80" r="2.5"/><circle cx="300" cy="46" r="2.5"/>
        <circle cx="340" cy="68" r="2.5"/><circle cx="380" cy="40" r="2.5"/>
        <circle cx="420" cy="58" r="2.5"/><circle cx="460" cy="30" r="2.5"/>
      </g>
      <g fill="#2A8F5A">
        <circle cx="20" cy="120" r="2.5"/><circle cx="60" cy="108" r="2.5"/>
        <circle cx="100" cy="124" r="2.5"/><circle cx="140" cy="90" r="2.5"/>
        <circle cx="180" cy="98" r="2.5"/><circle cx="220" cy="80" r="2.5"/>
        <circle cx="260" cy="104" r="2.5"/><circle cx="300" cy="72" r="2.5"/>
        <circle cx="340" cy="86" r="2.5"/><circle cx="380" cy="64" r="2.5"/>
        <circle cx="420" cy="76" r="2.5"/><circle cx="460" cy="48" r="2.5"/>
      </g>

      <!-- X labels -->
      <g font-size="9" fill="#9AA0A8" text-anchor="middle">
        <text x="20" y="178">juin</text>
        <text x="60" y="178">juil</text>
        <text x="100" y="178">août</text>
        <text x="140" y="178">sept</text>
        <text x="180" y="178">oct</text>
        <text x="220" y="178">nov</text>
        <text x="260" y="178">déc</text>
        <text x="300" y="178">janv</text>
        <text x="340" y="178">févr</text>
        <text x="380" y="178">mars</text>
        <text x="420" y="178">avr</text>
        <text x="460" y="178">mai</text>
      </g>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(60,680)">
    <rect width="1160" height="56" rx="6" fill="#0F2A47"/>
    <g transform="translate(28,16)">
      <rect width="3" height="24" fill="#F26B1F"/>
      <text x="16" y="11" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="0.08em">ZÉRO PIVOT TABLE À MAINTENIR</text>
      <text x="16" y="29" fill="#FFFFFF" font-size="11" opacity="0.8">Tout est en formules dynamiques. La table grandit, le dashboard suit.</text>
    </g>
    <g transform="translate(440,16)">
      <rect width="3" height="24" fill="#F26B1F"/>
      <text x="16" y="11" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="0.08em">FILTRES AUTO PAR AXE</text>
      <text x="16" y="29" fill="#FFFFFF" font-size="11" opacity="0.8">Secteur · Pilote · Type · Référentiel · Niveau criticité</text>
    </g>
    <g transform="translate(820,16)">
      <rect width="3" height="24" fill="#F26B1F"/>
      <text x="16" y="11" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="0.08em">EXPORT PDF EN 1 CLIC</text>
      <text x="16" y="29" fill="#FFFFFF" font-size="11" opacity="0.8">Paysage A3, prêt pour la revue de direction</text>
    </g>
  </g>
</svg>
